name: python lint

on:
  push:
    branches: [ main ]

jobs:
    validate:
        runs-on: ubuntu-latest
        strategy:
            matrix:
                python-version: [3.8, 3.9, 3.10, 3.11]

        steps:
          - name: checkout code
            uses: actions/checkout@v4

          - name: setup python 3.13
            uses: actions/setup-python@v5
            with:
              python-version: "3.13"

          - name: install dependencies
            run: pip install -r github-action-workflow1/requirements.txt
              

          - name: run linter
            run: flake8 app.py