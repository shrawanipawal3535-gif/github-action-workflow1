name: Python lint

on:
    push:
        branches: [main]
    
jobs:
    validate:
        runs-on: ubuntu-latest

        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Set up Python
              uses: actions/setup-python@v5
              with:
                  python-version: "3.13"

            - name: Install dependencies
              run: pip install -r requirements.txt
                  

            - name: run linter
              run: flake8 app.py